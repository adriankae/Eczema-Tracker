services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: eczema
      POSTGRES_USER: eczema
      POSTGRES_PASSWORD: eczema
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eczema -d eczema"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - zema-postgres-data:/var/lib/postgresql/data

  zema-be:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://eczema:eczema@postgres:5432/eczema
      APP_ENV: local
      DEPLOYMENT_TIMEZONE: UTC
      APP_PORT: 28173
      ENABLE_SCHEDULER: "true"
      JWT_SECRET: change-me-in-production
      INITIAL_USERNAME: admin
      INITIAL_PASSWORD: admin
      LOCATION_IMAGE_DIR: /data/location-images
      LOCATION_IMAGE_MAX_BYTES: 5242880
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "28173:28173"
    volumes:
      - zema-location-images:/data/location-images

  zema-cli:
    build:
      context: .
      dockerfile: docker/cli.Dockerfile
    environment:
      CZM_BASE_URL: http://zema-be:28173
      CZM_TIMEZONE: Europe/Berlin
      CZM_API_KEY: ${CZM_API_KEY:-}
    depends_on:
      - zema-be
    profiles:
      - cli

  zema-telegram:
    build:
      context: .
      dockerfile: docker/cli.Dockerfile
    restart: unless-stopped
    command: zema telegram run
    environment:
      CZM_BASE_URL: http://zema-be:28173
      CZM_API_KEY: ${CZM_API_KEY}
      CZM_TIMEZONE: ${CZM_TIMEZONE:-Europe/Berlin}
      ZEMA_TELEGRAM_BOT_TOKEN: ${ZEMA_TELEGRAM_BOT_TOKEN}
      ZEMA_TELEGRAM_ALLOWED_CHAT_IDS: ${ZEMA_TELEGRAM_ALLOWED_CHAT_IDS}
      ZEMA_TELEGRAM_ALLOWED_USER_IDS: ${ZEMA_TELEGRAM_ALLOWED_USER_IDS:-}
      ZEMA_TELEGRAM_ALLOW_WRITES: ${ZEMA_TELEGRAM_ALLOW_WRITES:-true}
      ZEMA_TELEGRAM_ALLOW_ADHERENCE_REBUILD: ${ZEMA_TELEGRAM_ALLOW_ADHERENCE_REBUILD:-false}
    depends_on:
      - zema-be
    profiles:
      - telegram

volumes:
  zema-postgres-data:
  zema-location-images:
