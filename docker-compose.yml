services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: eczema
      POSTGRES_USER: eczema
      POSTGRES_PASSWORD: eczema
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eczema -d eczema"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    environment:
      DATABASE_URL: postgresql+psycopg://eczema:eczema@postgres:5432/eczema
      APP_ENV: local
      DEPLOYMENT_TIMEZONE: UTC
      APP_PORT: 28173
      ENABLE_SCHEDULER: "true"
      JWT_SECRET: change-me-in-production
      INITIAL_USERNAME: admin
      INITIAL_PASSWORD: admin
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "28173:28173"
